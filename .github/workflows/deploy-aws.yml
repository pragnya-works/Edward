name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [prod]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/aws/**"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-aws.yml"

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_DIR: infra/aws/terraform
  AWS_REGION: ap-south-1
  WEB_PUBLIC_SITE_URL: https://edwardd.app
  WEB_PUBLIC_API_URL: https://api.edwardd.app
  WEB_PUBLIC_BETTER_AUTH_URL: https://edwardd.app

jobs:
  deploy:
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write CI tfvars
        run: |
          if [ -n "${TFVARS_RAW}" ]; then
            printf "%s" "${TFVARS_RAW}" > "${TERRAFORM_DIR}/ci.auto.tfvars"
          elif [ -n "${TFVARS_B64}" ]; then
            echo "${TFVARS_B64}" | base64 --decode > "${TERRAFORM_DIR}/ci.auto.tfvars"
          else
            echo "Missing tfvars secret: set AWS_TFVARS (preferred) or AWS_TFVARS_B64."
            exit 1
          fi
        env:
          TFVARS_RAW: ${{ secrets.AWS_TFVARS }}
          TFVARS_B64: ${{ secrets.AWS_TFVARS_B64 }}

      - name: Write Terraform backend config
        run: |
          if [ -n "${TF_BACKEND_CONFIG_RAW}" ]; then
            printf "%s" "${TF_BACKEND_CONFIG_RAW}" > "${TERRAFORM_DIR}/backend.hcl"
          elif [ -n "${TF_BACKEND_CONFIG_B64}" ]; then
            echo "${TF_BACKEND_CONFIG_B64}" | base64 --decode > "${TERRAFORM_DIR}/backend.hcl"
          else
            echo "Missing backend config secret: set TF_BACKEND_CONFIG (preferred) or TF_BACKEND_CONFIG_B64."
            exit 1
          fi
        env:
          TF_BACKEND_CONFIG_RAW: ${{ secrets.TF_BACKEND_CONFIG }}
          TF_BACKEND_CONFIG_B64: ${{ secrets.TF_BACKEND_CONFIG_B64 }}

      - name: Terraform init
        run: |
          terraform -chdir="${TERRAFORM_DIR}" init -backend-config=backend.hcl

      - name: Terraform fmt + validate
        run: |
          terraform -chdir="${TERRAFORM_DIR}" fmt -check -recursive
          terraform -chdir="${TERRAFORM_DIR}" validate

      - name: Bootstrap ECR repositories
        run: |
          terraform -chdir="${TERRAFORM_DIR}" apply -auto-approve \
            -var-file=ci.auto.tfvars \
            -var="api_image=bootstrap-placeholder" \
            -var="web_image=bootstrap-placeholder" \
            -target=aws_ecr_repository.api \
            -target=aws_ecr_repository.web \
            -target=aws_ecr_lifecycle_policy.api \
            -target=aws_ecr_lifecycle_policy.web

      - name: Resolve ECR repositories
        id: repos
        run: |
          API_REPO="$(terraform -chdir="${TERRAFORM_DIR}" output -raw api_ecr_repository_url)"
          WEB_REPO="$(terraform -chdir="${TERRAFORM_DIR}" output -raw web_ecr_repository_url)"
          echo "api_repo=${API_REPO}" >> "$GITHUB_OUTPUT"
          echo "web_repo=${WEB_REPO}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: api_image
        run: |
          TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${{ steps.repos.outputs.api_repo }}:${TAG}"
          docker buildx build \
            --platform linux/arm64 \
            --file apps/api/Dockerfile \
            --tag "${IMAGE_URI}" \
            --push \
            .
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        id: web_image
        env:
          WEB_PUBLIC_ASSETS_URL: ${{ vars.WEB_PUBLIC_ASSETS_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${{ steps.repos.outputs.web_repo }}:${TAG}"
          docker buildx build \
            --platform linux/arm64 \
            --file apps/web/Dockerfile \
            --build-arg "NEXT_PUBLIC_SITE_URL=${WEB_PUBLIC_SITE_URL}" \
            --build-arg "NEXT_PUBLIC_BETTER_AUTH_URL=${WEB_PUBLIC_BETTER_AUTH_URL}" \
            --build-arg "NEXT_PUBLIC_API_URL=${WEB_PUBLIC_API_URL}" \
            --build-arg "NEXT_PUBLIC_ASSETS_URL=${WEB_PUBLIC_ASSETS_URL:-}" \
            --build-arg "NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}" \
            --build-arg "SENTRY_DSN=${SENTRY_DSN:-}" \
            --build-arg "SENTRY_ORG=${SENTRY_ORG:-}" \
            --build-arg "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}" \
            --tag "${IMAGE_URI}" \
            --push \
            .
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (full stack)
        run: |
          terraform -chdir="${TERRAFORM_DIR}" apply -auto-approve \
            -var-file=ci.auto.tfvars \
            -var="api_image=${{ steps.api_image.outputs.image }}" \
            -var="web_image=${{ steps.web_image.outputs.image }}"

      - name: Output deployment endpoints
        run: |
          echo "APP_URL=$(terraform -chdir=\"${TERRAFORM_DIR}\" output -raw app_url)"
          echo "API_URL=$(terraform -chdir=\"${TERRAFORM_DIR}\" output -raw api_url)"
